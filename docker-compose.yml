version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: oln-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    networks:
      - oln-network
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: oln-backend
    ports:
      - "8000:8000"
    volumes:
      - /home/cwnaze/Notes:/app/vault
    networks:
      - oln-network
    restart: always

networks:
  oln-network:
    driver: bridge
